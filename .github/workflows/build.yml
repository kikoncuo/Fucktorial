name: build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller==6.10.0
          python -m playwright install chromium

      - name: Build with PyInstaller
        shell: bash
        run: |
          pyinstaller --noconfirm --clean fucktorial.spec

      - name: Package macOS DMG
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          cd dist
          hdiutil create -volname Fucktorial -srcfolder Fucktorial.app -ov -format UDZO Fucktorial-macOS.dmg

      - name: Package Windows ZIP
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          cd dist
          Compress-Archive -Path Fucktorial -DestinationPath Fucktorial-Windows.zip -Force

      - name: Upload artifact (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: Fucktorial-macOS
          path: dist/Fucktorial-macOS.dmg

      - name: Upload artifact (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: Fucktorial-Windows
          path: dist/Fucktorial-Windows.zip

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/Fucktorial-macOS/Fucktorial-macOS.dmg
            artifacts/Fucktorial-Windows/Fucktorial-Windows.zip
          generate_release_notes: true
